<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Phase 3 Storage Check</title>
</head>
<body>
    <pre id="result"></pre>
    <script>
        const state = JSON.parse(localStorage.getItem('movieMoodPickerState') || '{}');
        const watchedMovies = JSON.parse(localStorage.getItem('watchedMovies') || '{}');
        document.getElementById('result').textContent = JSON.stringify({
            selectedMood: state.selectedMood,
            stateWatchedMovies: state.watchedMovies || {},
            watchedMovies,
            movieCount: Array.isArray(state.movies) ? state.movies.length : 0
        }, null, 2);
    </script>
</body>
</html>
